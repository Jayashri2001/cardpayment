<html lang="en">

<head>

<body>

    <div class="header">

        <div class="logo">
            PREMIUM PAY
        </div>

    </div>

    <div class="container">

        <div class="banner">

            <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600&auto=format&fit=crop">

            <div class="overlay">

                <small>SECURE PAYMENT</small>

                <h1>Modern Secure Checkout</h1>

                <p>
                    Professional fintech payment experience

        <!-- STEP 1 -->

        <div class="card" id="step1">

            <h2 class="title">
                Start Payment

            <div class="input-box">

            </div>

            <div class="input-box">

                <span class="input-icon">📘</span>

                <input type="text"
                    class="input"
                    id="purpose"

                    onkeypress="return onlyTextNumber(event)">

            </div>

            <button class="btn"

        <!-- STEP 2 -->

        <div class="card"

            <h2 class="title">
                Payment Details
            </h2>

            <div class="summary">

                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">$0</span>
                </div>

                <div class="summary-row">
                    <span>Tax</span>
                    <span id="tax">$0</span>
                </div>

                <div class="summary-row total">
                    <span>Total</span>
                    <span id="total">$0</span>
                </div>

            </div>

            <!-- FULL NAME -->

            <div class="input-box">

                <span class="input-icon">👤</span>

                <input type="text"
                    class="input"
                    id="fullname"

                    onkeypress="return onlyText(event)">

            </div>

            <!-- COUNTRY + PHONE -->

            <div class="row">

                <div class="input-box">

                    <span class="input-icon">🌍</span>

                    <select class="input"
                        id="countryCode">

                        <option value="+91">🇮🇳 India (+91)</option>
                        <option value="+1">🇺🇸 USA (+1)</option>
                        <option value="+44">🇬🇧 UK (+44)</option>
                        <option value="+971">🇦🇪 UAE (+971)</option>
                        <option value="+61">🇦🇺 Australia (+61)</option>
                        <option value="+49">🇩🇪 Germany (+49)</option>
                        <option value="+33">🇫🇷 France (+33)</option>
                        <option value="+81">🇯🇵 Japan (+81)</option>
                        <option value="+86">🇨🇳 China (+86)</option>
                        <option value="+92">🇵🇰 Pakistan (+92)</option>
                        <option value="+880">🇧🇩 Bangladesh (+880)</option>
                        <option value="+94">🇱🇰 Sri Lanka (+94)</option>
                        <option value="+977">🇳🇵 Nepal (+977)</option>

                    </select>

                </div>

                <div class="input-box">

                    <span class="input-icon">📞</span>

                    <input type="tel"
                        class="input"
                        id="phone"
                        placeholder="Phone Number"
                        maxlength="15"
                        onkeypress="return onlyNumber(event)">

                </div>

            </div>

            <!-- EMAIL -->

            <div class="input-box">

                <span class="input-icon">✉️</span>

                <input type="email"
                    class="input"
                    id="email"
                    placeholder="Email Address">

            </div>

            <!-- CARD -->

            <!-- CARD INFORMATION -->

<div class="payment-box">

    <div class="payment-head">

        <h3>Card Information</h3>

        <div class="card-icon">

            <img src="https://cdn-icons-png.flaticon.com/512/349/349221.png">

        </div>

    </div>

    <!-- CARD NUMBER -->

    <div class="input-box">

        <span class="input-icon">💳</span>

        <input type="text"
            class="input"
            id="cardNumber"
            placeholder="1234 5678 9012 3456"
            maxlength="19"
            autocomplete="off">

    </div>

    <div class="row">

        <!-- EXPIRY -->

        <div class="input-box">

            <span class="input-icon">📅</span>

            <input type="text"
                class="input"
                id="expiry"
                placeholder="MM/YY"
                maxlength="5">

        </div>

        <!-- CVV -->

        <div class="input-box">

            <span class="input-icon">🔒</span>

            <input type="password"
                class="input"
                id="cvv"
                placeholder="123"
                maxlength="3">

        </div>

    </div>

</div>

<script>

    /* ======================================
       CARD NUMBER FORMAT
    ====================================== */

    const cardInput =
        document.getElementById("cardNumber");

    cardInput.addEventListener("input", function (e) {

        // Remove all non numbers
        let value =
            e.target.value.replace(/\D/g, '');

        // Max 16 digits
        value =
            value.substring(0, 16);

        // Add spaces after every 4 digits
        value =
            value.replace(/(\d{4})(?=\d)/g, '$1 ');

        // Final value
        e.target.value =
            value;

    });

    /* ======================================
       EXPIRY FORMAT
    ====================================== */

    const expiryInput =
        document.getElementById("expiry");

    expiryInput.addEventListener("input", function (e) {

        let value =
            e.target.value.replace(/\D/g, '');

        // Max 4 digits
        value =
            value.substring(0, 4);

        // Add slash
        if (value.length >= 3) {

            value =
                value.substring(0, 2)
                + "/"
                + value.substring(2);

        }

        e.target.value =
            value;

    });

    /* ======================================
       CVV ONLY 3 DIGITS
    ====================================== */

    const cvvInput =
        document.getElementById("cvv");

    cvvInput.addEventListener("input", function (e) {

        let value =
            e.target.value.replace(/\D/g, '');

        // Only 3 digits
        value =
            value.substring(0, 3);

        e.target.value =
            value;

    });

    /* ======================================
       CARD VALIDATION
    ====================================== */

    function validateCardDetails() {

        let card =
            document.getElementById("cardNumber");

        let expiry =
            document.getElementById("expiry");

        let cvv =
            document.getElementById("cvv");

        // REMOVE SPACES
        let cardNumber =
            card.value.replace(/\s/g, '');

        /* =========================
           CARD NUMBER VALIDATION
        ========================= */

        // Empty
        if (cardNumber == "") {

            alert("Enter card number");

            card.focus();

            return false;

        }

        // Must be exactly 16 digits
        if (cardNumber.length != 16) {

            alert("Card number must be 16 digits");

            card.focus();

            return false;

        }

        // ANY NUMBER ALLOWED
        // Examples:
        // 1111111111111111
        // 4444444444444444
        // 9999999999999999
        // ALL ACCEPTED

        /* =========================
           EXPIRY VALIDATION
        ========================= */

        if (expiry.value == "") {

            alert("Enter expiry date");

            expiry.focus();

            return false;

        }

        // MM/YY format
        if (
            !/^(0[1-9]|1[0-2])\/([0-9]{2})$/
                .test(expiry.value)
        ) {

            alert("Expiry format must be MM/YY");

            expiry.focus();

            return false;

        }

        /* =========================
           CVV VALIDATION
        ========================= */

        if (cvv.value == "") {

            alert("Enter CVV");

            cvv.focus();

            return false;

        }

        // Must be 3 digits
        if (cvv.value.length != 3) {

            alert("CVV must be 3 digits");

            cvv.focus();

            return false;

        }

        return true;

    }

</script>

            <button class="btn"
                id="paybtn"
                onclick="payNow()">

                Pay Securely

            </button>

        </div>

        <!-- SUCCESS -->

        <div class="card success"
            id="success">

            <div class="success-icon">✓</div>

            <h2>
                Payment Successful
            </h2>

            <div class="receipt">

                <div class="receipt-row">
                    <span>Transaction ID</span>
                    <span id="txn"></span>
                </div>

                <div class="receipt-row">
                    <span>Amount</span>
                    <span id="receiptAmount"></span>
                </div>

                <div class="receipt-row">
                    <span>Name</span>
                    <span id="receiptName"></span>
                </div>

                <div class="receipt-row">
                    <span>Country</span>
                    <span id="receiptCountry"></span>
                </div>

                <div class="receipt-row">
                    <span>Phone</span>
                    <span id="receiptPhone"></span>
                </div>

                <div class="receipt-row">
                    <span>Email</span>
                    <span id="receiptEmail"></span>
                </div>

            </div>

        </div>

    </div>

    <script>

        /* =========================================
           ONLY NUMBER
        ========================================= */

        function onlyNumber(evt) {

            let charCode =
                evt.which ? evt.which : evt.keyCode;

            if (
                charCode > 31 &&
                (charCode < 48 || charCode > 57)
            ) {

                return false;

            }

            return true;

        }

        /* =========================================
           ONLY TEXT
        ========================================= */

        function onlyText(evt) {

            let charCode =
                evt.which ? evt.which : evt.keyCode;

            if (
                !(charCode >= 65 && charCode <= 90) &&
                !(charCode >= 97 && charCode <= 122) &&
                charCode != 32
            ) {

                return false;

            }

            return true;

        }

        /* =========================================
           ONLY TEXT + NUMBER
        ========================================= */

        function onlyTextNumber(evt) {

            let charCode =
                evt.which ? evt.which : evt.keyCode;

            if (
                !(charCode >= 65 && charCode <= 90) &&
                !(charCode >= 97 && charCode <= 122) &&
                !(charCode >= 48 && charCode <= 57) &&
                charCode != 32
            ) {

                return false;

            }

            return true;

        }

        /* =========================================
           COUNTRY PHONE LENGTH
        ========================================= */

        const phoneLengths = {

            "+91": 10,
            "+1": 10,
            "+44": 10,
            "+971": 9,
            "+61": 9,
            "+49": 10,
            "+33": 9,
            "+81": 10,
            "+86": 11,
            "+92": 10,
            "+880": 10,
            "+94": 9,
            "+977": 10

        };

        /* =========================================
           CARD FORMAT
        ========================================= */

        document.getElementById("cardNumber")
            .addEventListener("input", function (e) {

                let value =
                    e.target.value.replace(/\D/g, '');

                value =
                    value.substring(0, 16);

                value =
                    value.replace(/(\d{4})(?=\d)/g, '$1 ');

                e.target.value =
                    value;

            });

        /* =========================================
           EXPIRY FORMAT
        ========================================= */

        document.getElementById("expiry")
            .addEventListener("input", function (e) {

                let value =
                    e.target.value.replace(/\D/g, '');

                if (value.length > 4) {

                    value =
                        value.substring(0, 4);

                }

                if (value.length >= 3) {

                    value =
                        value.substring(0, 2)
                        + "/" +
                        value.substring(2);

                }

                e.target.value =
                    value;

            });

        /* =========================================
           EMAIL VALIDATION
        ========================================= */

        function validateEmail(email) {

            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/
                .test(email);

        }

        /* =========================================
           CARD VALIDATION
        ========================================= */

        function validCard(cardNumber) {

            cardNumber =
                cardNumber.replace(/\s/g, '');

            if (cardNumber.length !== 16) {

                return false;

            }

            // Allow repeated numbers also

            return true;

        }

        /* =========================================
           EXPIRY VALIDATION
        ========================================= */

        function validExpiry(expiry) {

            if (
                !/^(0[1-9]|1[0-2])\/([0-9]{2})$/
                    .test(expiry)
            ) {

                return false;

            }

            let parts =
                expiry.split('/');

            let month =
                parseInt(parts[0], 10);

            let year =
                parseInt("20" + parts[1], 10);

            let today =
                new Date();

            let expiryDate =
                new Date(year, month);

            return expiryDate > today;

        }

        /* =========================================
           SHOW ERROR
        ========================================= */

        function showError(input, message) {

            input.classList.add("error");

            input.focus();

            alert(message);

        }

        document.querySelectorAll(".input")
            .forEach(input => {

                input.addEventListener("input", () => {

                    input.classList.remove("error");

                });

            });

        /* =========================================
           CHECKOUT
        ========================================= */

        function goCheckout() {

            let amount =
                document.getElementById("amount");

            let purpose =
                document.getElementById("purpose");

            if (amount.value.trim() == "") {

                showError(amount, "Enter amount");
                return;

            }

            if (purpose.value.trim() == "") {

                showError(purpose, "Enter payment purpose");
                return;

            }

            let tax =
                (amount.value * 0.10).toFixed(2);

            let total =
                (
                    parseFloat(amount.value)
                    + parseFloat(tax)
                ).toFixed(2);

            document.getElementById("subtotal")
                .innerHTML = "$" + amount.value;

            document.getElementById("tax")
                .innerHTML = "$" + tax;

            document.getElementById("total")
                .innerHTML = "$" + total;

            document.getElementById("receiptAmount")
                .innerHTML = "$" + total;

            document.getElementById("step1")
                .style.display = "none";

            document.getElementById("step2")
                .style.display = "block";

        }

        /* =========================================
           PAYMENT
        ========================================= */

        function payNow() {

            let fullname =
                document.getElementById("fullname");

            let country =
                document.getElementById("countryCode");

            let phone =
                document.getElementById("phone");

            let email =
                document.getElementById("email");

            let card =
                document.getElementById("cardNumber");

            let expiry =
                document.getElementById("expiry");

            let cvv =
                document.getElementById("cvv");

            /* FULL NAME */

            if (fullname.value.trim() == "") {

                showError(fullname, "Enter full name");
                return;

            }

            /* PHONE */

            let requiredLength =
                phoneLengths[country.value];

            if (
                phone.value.length != requiredLength
            ) {

                showError(
                    phone,
                    "Phone number must be "
                    + requiredLength +
                    " digits"
                );

                return;

            }

            /* EMAIL */

            if (!validateEmail(email.value)) {

                showError(email, "Invalid email");
                return;

            }

            /* CARD */

           

            /* BUTTON */

            let button =
                document.getElementById("paybtn");

            button.innerHTML =
                "Processing Payment...";

            button.disabled = true;

            /* SUCCESS */

            setTimeout(() => {

                let txn =
                    "TXN" +
                    Math.floor(Math.random() * 99999999);

                document.getElementById("txn")
                    .innerHTML = txn;

                document.getElementById("receiptName")
                    .innerHTML = fullname.value;

                document.getElementById("receiptCountry")
                    .innerHTML = country.value;

                document.getElementById("receiptPhone")
                    .innerHTML = phone.value;

                document.getElementById("receiptEmail")
                    .innerHTML = email.value;

                document.getElementById("step2")
                    .style.display = "none";

                document.getElementById("success")
                    .style.display = "block";

                window.scrollTo({

                    top: 0,
                    behavior: "smooth"

                });

            }, 2200);

        }

    </script>

</body>
